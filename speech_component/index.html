<!DOCTYPE html>
<html>
<head>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: transparent;
        }
        .speech-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .mic-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border: 1px solid rgba(0, 178, 169, 0.4);
            border-radius: 10px;
            background: rgba(0, 178, 169, 0.1);
            color: #e2e8f0;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            justify-content: center;
        }
        .mic-btn:hover {
            background: rgba(0, 178, 169, 0.2);
            border-color: rgba(0, 178, 169, 0.6);
            transform: translateY(-1px);
        }
        .mic-btn.listening {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.5);
            animation: pulse 1.5s infinite;
        }
        .mic-btn.unsupported {
            opacity: 0.4;
            cursor: not-allowed;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.3); }
            50% { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
        }
        .status-text {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="speech-container">
        <button class="mic-btn" id="micBtn" onclick="toggleListening()">
            <span id="micIcon">🎤</span>
            <span id="micLabel">Tap to Speak</span>
        </button>
    </div>
    <div class="status-text" id="statusText"></div>

    <script>
        // Streamlit component communication
        function sendToStreamlit(value) {
            window.parent.postMessage({
                type: "streamlit:setComponentValue",
                value: value
            }, "*");
        }

        function setFrameHeight(h) {
            window.parent.postMessage({
                type: "streamlit:setFrameHeight",
                height: h
            }, "*");
        }

        // Signal readiness
        window.parent.postMessage({type: "streamlit:componentReady", apiVersion: 1}, "*");

        // Set appropriate height
        setTimeout(function() { setFrameHeight(60); }, 100);

        // Speech Recognition setup
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        let isListening = false;
        const btn = document.getElementById('micBtn');
        const icon = document.getElementById('micIcon');
        const label = document.getElementById('micLabel');
        const status = document.getElementById('statusText');

        if (!SpeechRecognition) {
            btn.classList.add('unsupported');
            label.textContent = 'Speech not supported';
            status.textContent = 'Use Chrome, Edge, or Safari for voice input';
        } else {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onresult = function(event) {
                const transcript = event.results[0][0].transcript;
                sendToStreamlit(transcript);
                stopListening();
                status.textContent = '✅ "' + transcript + '"';
            };

            recognition.onerror = function(event) {
                stopListening();
                if (event.error === 'not-allowed') {
                    status.textContent = '⚠️ Microphone access denied. Check browser permissions.';
                } else {
                    status.textContent = '⚠️ Error: ' + event.error;
                }
            };

            recognition.onend = function() {
                if (isListening) stopListening();
            };
        }

        function toggleListening() {
            if (!recognition) return;
            if (isListening) {
                recognition.stop();
                stopListening();
            } else {
                startListening();
            }
        }

        function startListening() {
            isListening = true;
            btn.classList.add('listening');
            icon.textContent = '⏹️';
            label.textContent = 'Listening...';
            status.textContent = 'Speak now — describe your transaction';
            recognition.start();
        }

        function stopListening() {
            isListening = false;
            btn.classList.remove('listening');
            icon.textContent = '🎤';
            label.textContent = 'Tap to Speak';
        }
    </script>
</body>
</html>
