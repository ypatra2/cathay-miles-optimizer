name: Monthly Engine Refresh

on:
  schedule:
    - cron: '0 6 1 * *'        # TEST TRIGGER: 1st of the month at 06:00 UTC (14:00 HKT)
  workflow_dispatch:              # Allow manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run agentic refresh pipeline
        run: python refresh_cron.py --github-actions
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: engine-refresh/${{ github.run_id }}
          title: '🔬 Monthly Engine Refresh — Auto-generated'
          reviewers: 'ypatra2'          # EXPLICITLY REQUESTS REVIEW FROM YOU (Guarantees Email Notification)
          body: |
            ## 🤖 Agentic Engine Refresh

            This PR was auto-generated by the **Deep Research + Dev Agent** pipeline.

            ### What happened:
            1. The **Deep Research Agent** analyzed the current `optimizer.py` and searched for updates to earn rates, spending caps, promotions, MCC codes, and exclusions.
            2. The **Python Dev Agent** generated an updated `optimizer.py` incorporating all verified changes.

            ### Review Checklist:
            - [ ] Verify earn rate changes against official bank pages
            - [ ] Check that all function signatures are preserved
            - [ ] Run the Streamlit app locally to test recommendations
            - [ ] Check the delta report in `engine_deltas/` for source citations

            ### Files Changed:
            - `optimizer.py` — Updated calculation engine
            - `engine_deltas/engine_delta_*.md` — Research delta report
            - `engine_deltas/engine_patch_*.py` — Proposed code (backup)
          commit-message: 'feat(engine): monthly refresh via Deep Research Agent'
          delete-branch: true
